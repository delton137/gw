<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for the DNA strand -->
    <linearGradient id="dna-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#1e6b8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Sparkle glow -->
    <radialGradient id="sparkle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="246" fill="#0f172a"/>

  <!-- DNA Double Helix - Left strand -->
  <path d="M 160 60 
           C 160 120, 352 140, 352 200 
           C 352 260, 160 280, 160 340 
           C 160 400, 352 420, 352 452" 
        fill="none" stroke="url(#dna-grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- DNA Double Helix - Right strand -->
  <path d="M 352 60 
           C 352 120, 160 140, 160 200 
           C 160 260, 352 280, 352 340 
           C 352 400, 160 420, 160 452" 
        fill="none" stroke="url(#dna-grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- Base pair rungs -->
  <line x1="195" y1="130" x2="317" y2="130" stroke="#4ade80" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="172" y1="200" x2="340" y2="200" stroke="#4ade80" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="220" y1="270" x2="292" y2="270" stroke="#4ade80" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="172" y1="340" x2="340" y2="340" stroke="#4ade80" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <line x1="195" y1="408" x2="317" y2="408" stroke="#4ade80" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle 1 - top right -->
  <g transform="translate(400, 80)">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Sparkle 2 - mid left -->
  <g transform="translate(95, 230)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sparkle 3 - bottom right -->
  <g transform="translate(420, 390)">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle dots for extra magic -->
  <circle cx="110" cy="100" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="430" cy="260" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="80" cy="400" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="370" cy="160" r="3.5" fill="#fbbf24" opacity="0.5"/>
</svg>